
# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 dialect
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable Flyway — H2 starts fresh, no migrations needed
spring.flyway.enabled=false

# JWT — test values
jwt.secret=test-secret-key-must-be-at-least-32-characters-long
jwt.expiration=900000
jwt.refresh-expiration=604800000

# File upload
file.upload.path=uploads

# Mail — fake SMTP for tests (no real emails sent)
spring.mail.host=localhost
spring.mail.port=3025

# Disable Eureka in tests
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# Disable Kafka in tests (if added)
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# Swagger
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Disable scheduled jobs during tests
spring.task.scheduling.enabled=false
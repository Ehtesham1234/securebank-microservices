
# Database — from env
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool tuning for production
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# JPA — NEVER show SQL in production
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Mail
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.test-connection=false
management.endpoint.health.show-details=always
management.health.mail.enabled=false

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:900000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# File upload
file.upload.path=${FILE_UPLOAD_PATH:/app/uploads}

# Disable Swagger in production
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Logging — only warnings and above in production
logging.level.root=WARN
logging.level.com.ehtesham.securebank=INFO
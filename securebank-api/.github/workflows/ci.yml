name: SecureBank API CI

# WHEN does this pipeline run?
on:
  push:
    branches: [ main, develop ]    # on every push to these branches
  pull_request:
    branches: [ main ]             # on every PR targeting main

jobs:
  # ── JOB 1: Run Tests ──────────────────────────────────────────
  test:
    name: Build and Test
    runs-on: ubuntu-latest    # GitHub provides this Linux VM for free
    env:
      SPRING_PROFILES_ACTIVE: test
    steps:
      # Step 1: Download your code onto the GitHub runner VM
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Java 25 on the runner
      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven          # cache ~/.m2 between runs (faster builds)

      - name: Make Maven wrapper executable
        run: chmod +x mvnw
      # Step 3: Run all tests
      - name: Run tests
        run: mvn test -B -Dspring.profiles.active=test
        # If any test fails, this step fails, and the job fails,
        # and GitHub marks the push/PR as FAILED — blocks merging

      # Step 4: Save test results even if tests fail
      # (so you can see WHICH tests failed)
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/

  # ── JOB 2: Build Docker Image ─────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test                    # only runs if test job PASSES
    if: github.ref == 'refs/heads/main'   # only on main branch, not PRs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      # Build the JAR (tests already passed in job 1, skip here)
      - name: Build JAR
        run: mvn package -DskipTests -B

      # Build Docker image tagged with the git commit SHA
      # e.g. securebank-api:a3fcbc0140...
      - name: Build Docker image
        run: docker build -t securebank-api:${{ github.sha }} .

      - name: Confirm build success
        run: |
          echo "✅ Docker image built: securebank-api:${{ github.sha }}"
          docker images securebank-api
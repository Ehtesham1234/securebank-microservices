spring.application.name=loan-service
# CircuitBreaker configuration
resilience4j.circuitbreaker.instances.account-service.register-health-indicator=true
resilience4j.circuitbreaker.instances.account-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.account-service.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.account-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.account-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.account-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.account-service.slow-call-rate-threshold=100
resilience4j.circuitbreaker.instances.account-service.slow-call-duration-threshold=3s

# Retry configuration
resilience4j.retry.instances.account-service.max-attempts=3
resilience4j.retry.instances.account-service.wait-duration=1s
resilience4j.retry.instances.account-service.retry-exceptions=feign.FeignException.ServiceUnavailable

server.port=8084

eureka.client.service-url.defaultZone=\
  http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/securebank_loans}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:***REMOVED***}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway enabled — manages this service's own schema
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true


spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# OpenFeign timeouts
feign.client.config.default.connect-timeout=3000
feign.client.config.default.read-timeout=5000
# Feign + Resilience4j integration
spring.cloud.openfeign.circuitbreaker.enabled=true

# Actuator
management.endpoints.web.exposure.include=health,info,circuitbreakers
management.health.circuitbreakers.enabled=true
management.endpoint.health.show-details=always
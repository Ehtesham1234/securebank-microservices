eureka.client.service-url.defaultZone=${EUREKA_URL:http://eureka-server:8761/eureka/}

spring.ai.openai.api-key=${AI_API_KEY}
spring.ai.openai.chat.options.model=${AI_MODEL:google/gemini-2.5-flash:free}

logging.level.root=WARN
logging.level.com.ehtesham.ai_service=INFO

springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false
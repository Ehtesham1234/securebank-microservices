spring.application.name=ai-service
server.port=8085

eureka.instance.prefer-ip-address=true
eureka.client.registry-fetch-interval-seconds=10

# OpenAI-compatible endpoint — change only these three lines
# to switch providers (OpenRouter, Groq, Together AI, DeepSeek, Ollama)
spring.ai.openai.base-url=${AI_BASE_URL:https://openrouter.ai/api}
spring.ai.openai.chat.options.temperature=0.3

spring.cloud.openfeign.circuitbreaker.enabled=true
spring.cloud.openfeign.client.config.default.connect-timeout=3000
spring.cloud.openfeign.client.config.default.read-timeout=5000

resilience4j.circuitbreaker.instances.account-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.account-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.account-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.loan-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.loan-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.loan-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.securebank-api.sliding-window-size=10
resilience4j.circuitbreaker.instances.securebank-api.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.securebank-api.wait-duration-in-open-state=10s

resilience4j.ratelimiter.instances.ai-chat.limit-for-period=20
resilience4j.ratelimiter.instances.ai-chat.limit-refresh-period=1m
resilience4j.ratelimiter.instances.ai-chat.timeout-duration=0s

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

logging.level.org.springframework.ai=INFO
logging.level.com.ehtesham.ai_service=DEBUG
logging.pattern.level=%5p [%X{correlationId}]

spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
spring.application.name=ai-service
server.port=8085

# ── Eureka ─────────────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
# Don't block startup forever if Eureka isn't up yet while you're
# testing this service in isolation.
eureka.client.registry-fetch-interval-seconds=10


# ── Model configuration ────────────────────────────────────────────
# Provider-agnostic OpenAI-compatible endpoint. To switch providers,
# change ONLY these three lines (key, base-url, model) — no code or
# dependency changes required:
#
#   OpenRouter  : base-url=https://openrouter.ai/api          (free tier available)
#   Groq        : base-url=https://api.groq.com/openai
#   Together AI : base-url=https://api.together.xyz
#   DeepSeek    : base-url=https://api.deepseek.com
#   Local Ollama: base-url=http://localhost:11434              (OpenAI-compat mode)
#
# Not every free/discount model supports tool-calling reliably —
# verify your chosen model supports function calling before relying
# on it for the banking tools below.
spring.ai.openai.api-key=${AI_API_KEY:${OPENROUTER_API_KEY:}}
spring.ai.openai.base-url=${AI_BASE_URL:https://openrouter.ai/api}
spring.ai.openai.chat.options.model=${AI_MODEL:google/gemini-2.5-flash:free}
spring.ai.openai.chat.options.temperature=0.3
# LOW temperature (0.3) = factual, consistent responses.
# Appropriate for financial data. Avoid 0.9+ for banking.

# ── Feign — explicit timeouts (previously relied on framework
#    defaults, which are too generous for a synchronous chat request
#    the end user is waiting on) ───────────────────────────────────
spring.cloud.openfeign.circuitbreaker.enabled=true
spring.cloud.openfeign.client.config.default.connect-timeout=3000
spring.cloud.openfeign.client.config.default.read-timeout=5000

resilience4j.circuitbreaker.instances.account-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.account-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.account-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.loan-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.loan-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.loan-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.securebank-api.sliding-window-size=10
resilience4j.circuitbreaker.instances.securebank-api.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.securebank-api.wait-duration-in-open-state=10s

# ── Rate limiting — AI calls cost real money per token, so the
#    endpoints are worth protecting from accidental hammering (retry
#    storms from a flaky frontend, load tests, etc). Applied via
#    @RateLimiter on AiController (backed by spring-boot-starter-aop,
#    already a dependency). Tune per-user limits at the gateway;
#    this is a coarse service-level safety net. ────────────────────
resilience4j.ratelimiter.instances.ai-chat.limit-for-period=20
resilience4j.ratelimiter.instances.ai-chat.limit-refresh-period=1m
resilience4j.ratelimiter.instances.ai-chat.timeout-duration=0s

# ── Observability ───────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
# Actuator is reachable directly on 8085 by default — in production,
# make sure the API gateway does NOT proxy /actuator/** to the public
# internet, or restrict it with Spring Security / a management port.

logging.level.org.springframework.ai=INFO
logging.level.com.ehtesham.ai_service=DEBUG
logging.pattern.level=%5p [%X{correlationId}]

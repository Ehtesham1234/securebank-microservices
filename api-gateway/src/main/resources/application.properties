spring.application.name=api-gateway
server.port=8090

spring.cloud.gateway.discovery.locator.enabled=false
spring.cloud.gateway.forwarded-headers-strategy=framework

# ── AUTH → securebank-api ─────────────────────────────────────
spring.cloud.gateway.routes[0].id=auth-route
spring.cloud.gateway.routes[0].uri=lb://securebank-api
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**

# ── ACCOUNT → account-service ────────────────────────────────
spring.cloud.gateway.routes[1].id=account-route
spring.cloud.gateway.routes[1].uri=lb://account-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/accounts/**

# ── TRANSACTIONS → account-service ───────────────────────────
spring.cloud.gateway.routes[2].id=transaction-route
spring.cloud.gateway.routes[2].uri=lb://account-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/transactions/**

# ── CARDS → account-service ───────────────────────────────────
spring.cloud.gateway.routes[3].id=card-route
spring.cloud.gateway.routes[3].uri=lb://account-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/cards/**

# ── ADMIN ACCOUNTS → account-service ─────────────────────────
spring.cloud.gateway.routes[4].id=admin-account-route
spring.cloud.gateway.routes[4].uri=lb://account-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/admin/accounts/**

# ── ADMIN TRANSACTIONS → account-service ─────────────────────
spring.cloud.gateway.routes[5].id=admin-transaction-route
spring.cloud.gateway.routes[5].uri=lb://account-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/v1/admin/transactions/**

# ── KYC → kyc-service ────────────────────────────────────────
spring.cloud.gateway.routes[6].id=kyc-route
spring.cloud.gateway.routes[6].uri=lb://kyc-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/v1/kyc/**

# ── TELLER → kyc-service ─────────────────────────────────────
spring.cloud.gateway.routes[7].id=teller-route
spring.cloud.gateway.routes[7].uri=lb://kyc-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/v1/teller/**

# ── LOANS → loan-service ─────────────────────────────────────
spring.cloud.gateway.routes[8].id=loan-route
spring.cloud.gateway.routes[8].uri=lb://loan-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/v1/loans/**

# ── ADMIN LOANS → loan-service ───────────────────────────────
spring.cloud.gateway.routes[9].id=admin-loan-route
spring.cloud.gateway.routes[9].uri=lb://loan-service
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/v1/admin/loans/**

# ── ACCOUNT SECURITY → securebank-api ────────────────────────
spring.cloud.gateway.routes[10].id=account-security-route
spring.cloud.gateway.routes[10].uri=lb://securebank-api
spring.cloud.gateway.routes[10].predicates[0]=Path=/api/v1/account-security/**

# ── ADMIN USERS → securebank-api ─────────────────────────────
spring.cloud.gateway.routes[11].id=admin-route
spring.cloud.gateway.routes[11].uri=lb://securebank-api
spring.cloud.gateway.routes[11].predicates[0]=Path=/api/v1/admin/**

# ── AI SERVICE → ai-service ──────────────────────────────────
spring.cloud.gateway.routes[12].id=ai-route
spring.cloud.gateway.routes[12].uri=lb://ai-service
spring.cloud.gateway.routes[12].predicates[0]=Path=/api/v1/ai/**

# ── ACTUATOR → securebank-api ────────────────────────────────
spring.cloud.gateway.routes[13].id=actuator-route
spring.cloud.gateway.routes[13].uri=lb://securebank-api
spring.cloud.gateway.routes[13].predicates[0]=Path=/actuator/**

management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.health.show-details=always

spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}